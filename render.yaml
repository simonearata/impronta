# render.yaml — Blueprint Impronta su Render

databases:
  - name: impronta-db
    plan: basic-256mb
    databaseName: impronta
    user: impronta

services:
  # --- API (Fastify + Prisma) — $7/mese, sempre acceso ---
  - type: web
    name: impronta-api
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --ignore-scripts &&
      pnpm db:generate &&
      pnpm build
    startCommand: |
      npx prisma migrate deploy &&
      npx prisma db seed &&
      node dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: impronta-db
          property: connectionString
      - key: UPLOAD_DIR
        value: ./uploads
      - key: PUBLIC_UPLOAD_BASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@impronta-vini.it
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_NAME
        value: Valerio De Donno

  # --- Frontend (Vite static) — gratis ---
  - type: web
    name: impronta-web
    runtime: static
    rootDir: apps/web
    buildCommand: |
      npm install -g pnpm &&
      pnpm install &&
      pnpm build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_DATA_SOURCE
        value: api
      - key: VITE_API_URL
        sync: false
      - key: VITE_SITE_URL
        sync: false
